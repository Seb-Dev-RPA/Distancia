<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acortando la distancia 💞</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg, #ffe0ec, #fff5f9);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

.contenedor{
    margin-top:70px;
    padding:20px;
    position:relative;
    z-index:2;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}

h1{
    font-size:26px;
    color:#d6336c;
}

.distancia{
    font-size:42px;
    margin:20px 0;
    font-weight:bold;
}

.mensaje{
    font-size:20px;
    min-height:40px;
    margin:15px 0;
    color:#555;
    transition: opacity 0.4s;
}

#gif-container{
    height:240px; /* espacio fijo para que nada se mueva */
    display:flex;
    align-items:center;
    justify-content:center;
}

#gif{
    max-width:220px;
    border-radius:15px;
    display:none;
    opacity:0;
    transition: opacity 0.4s;
}

button{
    margin-top:25px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

.final-mensaje{
    font-size:30px;
    font-weight:bold;
    color:#d6336c;
}
</style>
</head>

<body>

<div class="contenedor">
    <h1>📍 Distancia entre tú y yo</h1>

    <div class="distancia" id="km">1050 km</div>

    <div class="mensaje" id="mensaje">
        Pero vamos a hacer algo al respecto…
    </div>

    <div id="gif-container">
        <img id="gif">
    </div>

    <button id="acercar">✨ Acercarnos un poquito</button>
</div>

<script>
let distancia = 1050;
let clickFinal = 0;

const kmTexto = document.getElementById("km");
const mensaje = document.getElementById("mensaje");
const boton = document.getElementById("acercar");
const gif = document.getElementById("gif");

const eventos = [
    {km:975, texto:"😌 ¿Lista?"},
    {km:900, texto:"🌊 Cruzando un poquito de mar…", gif:"IMG_3415.gif"},
    {km:750, texto:"☁️ Las nubes dicen que vamos bien.", gif:"IMG_3418.gif"},
    {km:600, texto:"📞 Hablar contigo ya hace que esto se sienta más corto.", gif:"IMG_3419.gif"},
    {km:450, texto:"🐱 Nivel de ternura detectado en aumento.", gif:"IMG_3420.gif"},
    {km:300, texto:"🍿 Compartir tiempo juntos reduce kilómetros.", gif:"IMG_3421.gif"},
    {km:150, texto:"😌 La distancia empieza a ponerse nerviosa…", gif:"IMG_3422.gif"},
    {km:75, texto:"💓 Esto ya se siente demasiado cerca.", gif:"IMG_3423.gif"}
];

function actualizarMensaje(){
    for(let evento of eventos){
        if(distancia <= evento.km && !evento.mostrado){

            mensaje.style.opacity = 0;
            gif.style.opacity = 0;

            setTimeout(()=>{
                mensaje.innerHTML = evento.texto;

                if(evento.gif){
                    gif.src = evento.gif;
                    gif.style.display = "block";
                    gif.style.opacity = 1;
                }

                mensaje.style.opacity = 1;
            },300);

            evento.mostrado = true;
        }
    }
}

boton.addEventListener("click", ()=>{

    if(distancia > 0){
        distancia -= 75;
        if(distancia < 0) distancia = 0;

        kmTexto.textContent = distancia + " km";
        actualizarMensaje();
    }

    if(distancia === 0){
        clickFinal++;

        if(clickFinal === 1){
            boton.innerText = "💞 Último pasito";
        }

        if(clickFinal === 2){
            boton.style.display="none";
            document.querySelector(".contenedor").innerHTML = `
                <h1 class="final-mensaje">
                    🎉 Distancia física: 0 km 💖
                </h1>
                <p style="font-size:22px;">
                    Igual me gusta recorrerla contigo ❤️
                </p>
            `;
        }
    }
});
</script>

</body>
</html>
